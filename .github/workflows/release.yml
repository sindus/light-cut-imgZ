name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend (ESLint)
        run: npm run lint

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Test frontend (Vitest)
        run: npm run test:run

      - name: Lint Rust (Clippy)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test

  release:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'light-cut-imgZ ${{ github.ref_name }}'
          releaseBody: |
            ## What's new

            See [CHANGELOG](https://github.com/sindus/light-cut-imgZ/blob/main/CHANGELOG.md) for details.

            ## Install

            **Linux (AppImage)**
            ```sh
            curl -fsSL https://github.com/sindus/light-cut-imgZ/releases/download/${{ github.ref_name }}/light-cut-imgZ_${{ github.ref_name }}_amd64.AppImage \
              -o ~/Applications/light-cut-imgZ.AppImage && \
            chmod +x ~/Applications/light-cut-imgZ.AppImage
            ```

            **macOS**
            Download the `.dmg` for your architecture below.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
